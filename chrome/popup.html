<html>
<head>
<meta charset=utf-8>

<style type="text/css">
    html, body {
        padding-left: 5px;
        padding-right: 15px;
        padding-top: 5px;
        padding-bottom: 5px;
        font-size: 11pt;
        width: 280px !important;
        max-height: 285px;
        overflow: hidden;
    }

    .navbar {
        width: 100%;
        padding-bottom: 5px;
    }

    .clickable {
        cursor: pointer;
    }

    .lang_select {
        width: 100%;
        height: 36px;
        border: 1px solid #ccc;
        padding: 2px;
    }

    .view {
        height: 245px;
        overflow-y: auto;
        overflow-x: hidden;
        display: none;
    }

    .view_main {
        display: block;
    }
</style>

<link rel="stylesheet" href="vendor/picocss/pico.min.css">
</head>

<body>

<div class="view view_main">
    <div class="navbar" style="text-align:right;">
        <span class="clickable" id="settingsbtn">
            <img src="vendor/feathericons/settings.svg" alt="settings" />
        </span>
    </div>

    <div class="input-line">
        <label for="translatefrom">
            网页语言
        </label>
        <select id="translatefrom" class="lang_select"></select>
    </div>

    <div class="input-line">
        <label for="translateto">
            目标语言
        </label>
        <select id="translateto" class="lang_select"></select>
    </div>

    <button id="doTranslate" style="width:48%; height:36px; padding:2px; float:left;">翻译网页</button>
    <button id="goback" style="width:48%; height:36px; padding:2px; float:right;">恢复网页</button>

    <div style="clear:both;"></div>
</div>

<div class="view view_settings">
    <div class="navbar" style="text-align:left; ">
        <span class="clickable btnToMainView">
            <img src="vendor/feathericons/arrow-left.svg" alt="back" />
        </span>
    </div>

    <div class="input-line">
        <label for="settingsProvider">翻译服务</label>
        <select id="settingsProvider" class="setting lang_select" data-storename="provider">
            <option value="baidu">百度翻译</option>
            <option value="custom">自定义 API</option>
        </select>
    </div>
    <div class="input-line">
        <label for="settingsDefaultLang">快捷目标语言</label>
        <select id="settingsDefaultLang" class="setting lang_select" data-storename="default-lang">
        </select>
    </div>
    <div class="input-line">
        <label for="settingsAppid">百度 APP ID</label>
        <input id="settingsAppid" type="text" class="setting lang_select" data-storename="baidu-appid" />
    </div>
    <div class="input-line">
        <label for="settingsSecret">百度 Secret Key</label>
        <input id="settingsSecret" type="text" class="setting lang_select" data-storename="baidu-secret" />
    </div>
    <div class="input-line">
        <label for="settingsEndpoint">API端点</label>
        <input id="settingsEndpoint" type="text" class="setting lang_select" data-storename="api-endpoint" />
    </div>
    <div class="input-line">
        <label for="api_key">API 密钥</label>
        <input id="api_key" type="text" class="setting lang_select" data-storename="api-key" />
    </div>
    <div style="margin-top:5px;">
        <button id="saveSettings" style="width:100%; height:36px; padding:2px;">保存设置</button>
    </div>
</div>
</body>
<script type="text/javascript" src="popup.js"></script>
</html>
